name: Generate Contribution Snake 🐍

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

# ── Required so the bot can push to the output branch ──────────
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake (dark matrix green)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Necookie
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00FF41&color_dots=#0d0d0d,#003300,#005500,#008F11,#00FF41
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00FF41

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
