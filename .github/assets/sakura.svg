<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 65">
  <style>
    @keyframes fall0{0%{transform:translate(0px,-10px) rotate(0deg);opacity:0}5%{opacity:0.9}90%{opacity:0.7}100%{transform:translate(45px,75px) rotate(380deg);opacity:0}}
    @keyframes fall1{0%{transform:translate(0px,-10px) rotate(20deg);opacity:0}8%{opacity:0.8}88%{opacity:0.6}100%{transform:translate(-38px,72px) rotate(-300deg);opacity:0}}
    @keyframes fall2{0%{transform:translate(0px,-10px) rotate(-10deg);opacity:0}6%{opacity:0.85}92%{opacity:0.65}100%{transform:translate(55px,68px) rotate(420deg);opacity:0}}
    @keyframes fall3{0%{transform:translate(0px,-10px) rotate(30deg);opacity:0}7%{opacity:0.75}85%{opacity:0.55}100%{transform:translate(-30px,74px) rotate(-260deg);opacity:0}}
    @keyframes fall4{0%{transform:translate(0px,-10px) rotate(-20deg);opacity:0}9%{opacity:0.9}91%{opacity:0.7}100%{transform:translate(40px,70px) rotate(350deg);opacity:0}}
    @keyframes fall5{0%{transform:translate(0px,-10px) rotate(15deg);opacity:0}5%{opacity:0.8}89%{opacity:0.6}100%{transform:translate(-42px,73px) rotate(-340deg);opacity:0}}
    @keyframes fall6{0%{transform:translate(0px,-10px) rotate(-5deg);opacity:0}7%{opacity:0.85}87%{opacity:0.65}100%{transform:translate(50px,71px) rotate(400deg);opacity:0}}
    @keyframes fall7{0%{transform:translate(0px,-10px) rotate(25deg);opacity:0}6%{opacity:0.7}90%{opacity:0.5}100%{transform:translate(-35px,69px) rotate(-290deg);opacity:0}}
    @keyframes fall8{0%{transform:translate(0px,-10px) rotate(-15deg);opacity:0}8%{opacity:0.88}86%{opacity:0.68}100%{transform:translate(48px,74px) rotate(370deg);opacity:0}}
    @keyframes fall9{0%{transform:translate(0px,-10px) rotate(10deg);opacity:0}5%{opacity:0.82}91%{opacity:0.62}100%{transform:translate(-45px,72px) rotate(-310deg);opacity:0}}
    @keyframes fall10{0%{transform:translate(0px,-10px) rotate(-25deg);opacity:0}9%{opacity:0.78}88%{opacity:0.58}100%{transform:translate(52px,70px) rotate(360deg);opacity:0}}
    @keyframes fall11{0%{transform:translate(0px,-10px) rotate(35deg);opacity:0}6%{opacity:0.86}89%{opacity:0.66}100%{transform:translate(-40px,73px) rotate(-280deg);opacity:0}}
    @keyframes fall12{0%{transform:translate(0px,-10px) rotate(-30deg);opacity:0}7%{opacity:0.84}87%{opacity:0.64}100%{transform:translate(43px,75px) rotate(390deg);opacity:0}}
    @keyframes sway{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}

    .p0{animation:fall0 4.2s ease-in-out infinite 0.0s}
    .p1{animation:fall1 3.8s ease-in-out infinite 0.6s}
    .p2{animation:fall2 4.5s ease-in-out infinite 1.2s}
    .p3{animation:fall3 3.6s ease-in-out infinite 0.3s}
    .p4{animation:fall4 4.1s ease-in-out infinite 1.8s}
    .p5{animation:fall5 3.9s ease-in-out infinite 0.9s}
    .p6{animation:fall6 4.4s ease-in-out infinite 1.5s}
    .p7{animation:fall7 3.7s ease-in-out infinite 0.4s}
    .p8{animation:fall8 4.3s ease-in-out infinite 2.1s}
    .p9{animation:fall9 4.0s ease-in-out infinite 0.7s}
    .p10{animation:fall10 3.5s ease-in-out infinite 1.1s}
    .p11{animation:fall11 4.6s ease-in-out infinite 1.7s}
    .p12{animation:fall12 3.8s ease-in-out infinite 2.4s}
  </style>
  <defs>
    <radialGradient id="pink" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffb7c5"/>
      <stop offset="100%" stop-color="#ff7b9c"/>
    </radialGradient>
    <radialGradient id="light" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#ffe4ec"/>
      <stop offset="100%" stop-color="#ffadc0"/>
    </radialGradient>
    <radialGradient id="green" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a8f0b0"/>
      <stop offset="100%" stop-color="#6dcf7a"/>
    </radialGradient>
  </defs>

  <!-- Petal: rounded ellipse shape, 5-petal flower look via ellipse + rotation -->
  <!-- Row 1 petals -->
  <g class="p0"><ellipse cx="50" cy="5" rx="7" ry="4" fill="url(#pink)" transform="rotate(-20 50 5)"/></g>
  <g class="p1"><ellipse cx="120" cy="3" rx="5" ry="3" fill="url(#light)" transform="rotate(15 120 3)"/></g>
  <g class="p2"><ellipse cx="200" cy="6" rx="8" ry="4.5" fill="url(#pink)" transform="rotate(-35 200 6)"/></g>
  <g class="p3"><ellipse cx="280" cy="2" rx="6" ry="3.5" fill="url(#green)" transform="rotate(25 280 2)"/></g>
  <g class="p4"><ellipse cx="355" cy="4" rx="7.5" ry="4" fill="url(#light)" transform="rotate(-10 355 4)"/></g>
  <g class="p5"><ellipse cx="430" cy="6" rx="5.5" ry="3" fill="url(#pink)" transform="rotate(30 430 6)"/></g>
  <g class="p6"><ellipse cx="510" cy="3" rx="8" ry="4.5" fill="url(#light)" transform="rotate(-40 510 3)"/></g>
  <g class="p7"><ellipse cx="590" cy="5" rx="6.5" ry="3.5" fill="url(#green)" transform="rotate(20 590 5)"/></g>
  <g class="p8"><ellipse cx="660" cy="2" rx="7" ry="4" fill="url(#pink)" transform="rotate(-15 660 2)"/></g>
  <g class="p9"><ellipse cx="740" cy="4" rx="5" ry="3" fill="url(#light)" transform="rotate(35 740 4)"/></g>
  <g class="p10"><ellipse cx="810" cy="6" rx="8" ry="4.5" fill="url(#pink)" transform="rotate(-30 810 6)"/></g>
  <g class="p11"><ellipse cx="855" cy="3" rx="6" ry="3.5" fill="url(#green)" transform="rotate(10 855 3)"/></g>
  <g class="p12"><ellipse cx="900" cy="5" rx="7" ry="4" fill="url(#light)" transform="rotate(-25 900 5)"/></g>
</svg>
